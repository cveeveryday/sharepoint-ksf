
name: 'Terraform Destroy'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      sp_tenant_id:
        description: 'SharePoint Tenant ID'
        required: true
        type: string
      sp_client_id:
        description: 'SharePoint Client ID'
        required: true
        type: string
      sp_site_url:
        description: 'SharePoint Site URL'
        required: true
        type: string
      sp_tenant_name:
        description: 'SharePoint Tenant Name'
        required: true
        type: string

permissions:
  id-token: write # Required for requesting the JWT
  contents: read  # Required for actions/checkout

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Terraform Init
        run: | 
            terraform init \
            -backend-config="bucket=${{ vars.S3_BUCKET_NAME }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.DYNAMODB_TABLE }}"
        working-directory: .
        env:
          TF_VAR_s3bucketname: ${{ vars.S3_BUCKET_NAME }}
          TF_VAR_s3bucketregion: ${{ vars.AWS_REGION }}
          TF_VAR_dynamodb_table: ${{ vars.DYNAMODB_TABLE }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve